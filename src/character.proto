syntax = "proto3";

package ms;

import "src/equip.proto";

enum Job {
  JOB_UNSPECIFIED = 0;
  JOB_BEGINNER = 1;
  JOB_WARRIOR = 2;
}

enum StatField {
  STAT_FIELD_UNSPECIFIED = 0;
  STAT_FIELD_STR = 1;
  STAT_FIELD_DEX = 2;
  STAT_FIELD_INT = 3;
  STAT_FIELD_LUK = 4;
  STAT_FIELD_HP = 5;
  STAT_FIELD_MP = 6;
}

message AllocatedStats {
  int32 str = 1;
  int32 dex = 2;
  int32 int = 3;
  int32 luk = 4;
  int32 hp = 5;
  int32 mp = 6;
}

message Character {
  string name = 1;
  int32 level = 2;
  Job job = 3;
  int32 job_stage = 4;
  int32 ap = 5;
  AllocatedStats allocated_stats = 6;
  repeated Equip equip_inventory = 7;
}
