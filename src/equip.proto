syntax = "proto3";

package ms;

enum AttackSpeed {
  ATTACK_SPEED_UNSPECIFIED = 0;
  ATTACK_SPEED_SLOWER = 1;
  ATTACK_SPEED_SLOW_1 = 2;
  ATTACK_SPEED_SLOW_2 = 3;
  ATTACK_SPEED_AVERAGE = 4;
  ATTACK_SPEED_FAST_1 = 5;
  ATTACK_SPEED_FAST_2 = 6;
  ATTACK_SPEED_FASTER = 7;
  ATTACK_SPEED_FASTEST_1 = 8;
  ATTACK_SPEED_FASTEST_2 = 9;
  ATTACK_SPEED_FASTEST_3 = 10;
}

enum EquipType {
  EQUIP_TYPE_UNSPECIFIED = 0;
  EQUIP_TYPE_ONE_HANDED_SWORD = 1;
}

enum EquipSlot {
  EQUIP_SLOT_UNSPECIFIED = 0;
  EQUIP_SLOT_PRIMARY_WEAPON = 1;
}

enum EquipJobCategory {
  EQUIP_JOB_CATEGORY_UNSPECIFIED = 0;
  EQUIP_JOB_CATEGORY_WARRIOR = 1;
  EQUIP_JOB_CATEGORY_BOWMAN = 2;
  EQUIP_JOB_CATEGORY_MAGICIAN = 3;
  EQUIP_JOB_CATEGORY_THIEF = 4;
  EQUIP_JOB_CATEGORY_PIRATE = 5;
  EQUIP_JOB_CATEGORY_UNIVERSAL = 6;
}

message EquipStats {
  int32 str = 1;
  int32 dex = 2;
  int32 int = 3;
  int32 luk = 4;
  int32 attack = 5;
  int32 magic_attack = 6;
  int32 max_hp = 7;
  int32 def = 8;
}

// Prototype definition for a piece of equipment. Stored in data/ as text
// protos; loaded read-only at runtime and referenced by EquipInstance.
message Equip {
  // -- Prototype fields ----------------------------------
  // All fixed properties of this item type. Used for display, eligibility
  // checks, scroll filtering, and base stat calculations.
  AttackSpeed attack_speed = 1;
  EquipStats base_stats = 2;
  EquipJobCategory equip_job_category = 3;
  EquipSlot equip_slot = 4;
  EquipType equip_type = 5;
  string name = 6;
  int32 required_level = 7;
  int32 upgrade_slots = 8;  // Starting slot count for a fresh drop.

  // -- Mutable instance state ----------------------------
  // Per-instance upgrade state. Empty on the prototype; populated when
  // serializing a live EquipInstance to disk.
}
