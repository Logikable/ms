syntax = "proto3";

package ms;

import "src/protos/equip.proto";

// Tier is determined by the equipment's required_level:
//   Tier 1: 0-74, Tier 2: 75-114, Tier 3: 115+
enum ScrollTier {
  SCROLL_TIER_UNSPECIFIED = 0;
  SCROLL_TIER_1 = 1;
  SCROLL_TIER_2 = 2;
  SCROLL_TIER_3 = 3;
}

enum ScrollCategory {
  SCROLL_CATEGORY_UNSPECIFIED = 0;
  SCROLL_CATEGORY_CLEAN_SLATE = 1;
}

// Primary stat boosted by the scroll. Values are ordered for display: the
// scroll list in the UI is sorted by ScrollType ascending, then by
// success_rate descending within each type.
enum ScrollType {
  SCROLL_TYPE_UNSPECIFIED = 0;
  SCROLL_TYPE_ATT = 1;
  SCROLL_TYPE_MATT = 2;
  SCROLL_TYPE_STR = 3;
  SCROLL_TYPE_DEX = 4;
  SCROLL_TYPE_INT = 5;
  SCROLL_TYPE_LUK = 6;
  SCROLL_TYPE_HP = 7;
  SCROLL_TYPE_DEF = 8;
}

// One Scroll represents a single, fully-specified scroll option,
// e.g. "Spell Trace 100% STR, Warrior, Tier 1".
message Scroll {
  string name = 1;
  // Success probability in [0, 100].
  int32 success_rate = 2;
  ScrollTier tier = 3;
  EquipStats stats = 4;
  repeated EquipJobCategory applicable_job_categories = 5;
  ScrollType scroll_type = 6;
  ScrollCategory scroll_category = 7;
}
