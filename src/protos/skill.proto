syntax = "proto3";

package ms;

import "src/protos/character.proto";

// How a skill folds into the game. Combat is a single expected-damage
// auto-attack, so skills are passive modifiers in one of two roles.
enum SkillKind {
  SKILL_KIND_UNSPECIFIED = 0;
  SKILL_KIND_ATTACK = 1;   // the swing's identity: supplies skill_pct
  SKILL_KIND_PASSIVE = 2;  // folds its levers into the character's stats
  // Cast, but not an attack -- mobility and the like. Nothing it does is
  // modelled; it exists so the skill list matches the real job.
  SKILL_KIND_ACTIVE = 3;
}

// A skill's per-level contribution to the character's stats. Only the levers we
// currently model are here; a skill whose real effect is something we don't
// track (speed, jump, ...) simply carries no levers and does nothing. Percents
// are fractions (0.10 == +10%).
message SkillEffect {
  double skill_pct = 1;         // damage multiplier (attack skills)
  double max_hp_pct = 2;        // bonus to max HP, applied after the flat HP
  int32 def = 3;                // flat weapon DEF
  int32 max_hp_per_level = 4;   // flat max HP for each character level
  double damage_taken_pct = 5;  // share of incoming damage cancelled
  double crit_rate = 6;         // added chance for a swing to crit
}

// Static definition of a skill. Loaded from data/skills textprotos at startup,
// keyed by filename stem; the Character's skill_levels map references the skill
// by its display `name`. The effect at learned level L is base + per_level *
// (L - 1), so `base` is the level-1 value and `per_level` the increment beyond.
message Skill {
  string name = 1;
  SkillKind kind = 2;
  int32 max_level = 3;
  SkillEffect base = 4;
  SkillEffect per_level = 5;
  // The advancement this skill belongs to. Its SP pool buys the skill, and the
  // skills tab groups one page per advancement. Determines the SP stage (see
  // StageForAdvancement).
  JobAdvancement job_advancement = 6;
  // How many enemies one swing of this attack hits (attack skills). Unset/0 is
  // treated as 1 (single target); the bare poke is likewise 1.
  int32 max_enemies = 7;
  // How many times one swing strikes each enemy it reaches. Damage is
  // skill_pct per line, so a 90% 2-line skill deals 180% to every target.
  // Unset/0 is treated as 1.
  int32 lines = 8;
}
