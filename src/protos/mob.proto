syntax = "proto3";

package ms;

// Static definition of a monster type. Loaded from data/mobs textprotos at
// startup; shared read-only across all spawns of the same type. Drops are
// added later.
message Mob {
  string name = 1;
  int32 level = 2;
  int32 attack = 3;
  int32 max_hp = 4;
  int64 exp = 5;
  // Items this mob can drop, referencing ItemPrototype data files by filename
  // stem. Drop rates and quantities are added later.
  repeated string drops = 6;
  // Physical defense rate as a whole percent (PDR); reduces incoming damage
  // unless the attacker ignores it. Snails are 0. Mirrors EquipStats percents.
  int32 pdr = 7;
  // True for bosses: they take 0.5x elemental base and are subject to boss%.
  bool boss = 8;
}
