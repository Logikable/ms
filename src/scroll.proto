syntax = "proto3";

package ms;

import "src/equip.proto";

// Tier is determined by the equipment's required_level:
//   Tier 1: 0-74, Tier 2: 75-114, Tier 3: 115+
enum ScrollTier {
  SCROLL_TIER_UNSPECIFIED = 0;
  SCROLL_TIER_1 = 1;
  SCROLL_TIER_2 = 2;
  SCROLL_TIER_3 = 3;
}

// One Scroll represents a single, fully-specified scroll option,
// e.g. "Spell Trace 100% STR, Warrior, Tier 1".
message Scroll {
  string name = 1;
  // Success probability in [0, 100].
  int32 success_rate = 2;
  ScrollTier tier = 3;
  EquipStats stats = 4;
  repeated EquipJobCategory applicable_job_categories = 5;
}
