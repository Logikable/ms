syntax = "proto3";

package ms;

enum AttackSpeed {
  ATTACK_SPEED_UNSPECIFIED = 0;
  ATTACK_SPEED_SLOWER = 1;
  ATTACK_SPEED_SLOW_1 = 2;
  ATTACK_SPEED_SLOW_2 = 3;
  ATTACK_SPEED_AVERAGE = 4;
  ATTACK_SPEED_FAST_1 = 5;
  ATTACK_SPEED_FAST_2 = 6;
  ATTACK_SPEED_FASTER = 7;
  ATTACK_SPEED_FASTEST_1 = 8;
  ATTACK_SPEED_FASTEST_2 = 9;
  ATTACK_SPEED_FASTEST_3 = 10;
}

// The specific item type (e.g. one-handed sword, bow). Used to determine
// applicable scrolls, attack animations, and weapon-specific mechanics.
enum EquipType {
  EQUIP_TYPE_UNSPECIFIED = 0;
  EQUIP_TYPE_ONE_HANDED_SWORD = 1;
}

// The equipment window slot this item occupies when worn. Determines where the
// item appears on the character and enforces one-item-per-slot.
enum EquipSlot {
  EQUIP_SLOT_UNSPECIFIED = 0;
  EQUIP_SLOT_PRIMARY_WEAPON = 1;
}

// Which job branches can equip this item. UNIVERSAL means any job can equip
// it; BEGINNER includes pre-advancement characters (Noblesse, etc.). Used to
// filter scrolls and enforce equip requirements.
enum EquipJobCategory {
  EQUIP_JOB_CATEGORY_UNSPECIFIED = 0;
  EQUIP_JOB_CATEGORY_WARRIOR = 1;
  EQUIP_JOB_CATEGORY_BOWMAN = 2;
  EQUIP_JOB_CATEGORY_MAGICIAN = 3;
  EQUIP_JOB_CATEGORY_THIEF = 4;
  EQUIP_JOB_CATEGORY_PIRATE = 5;
  EQUIP_JOB_CATEGORY_UNIVERSAL = 6;
  EQUIP_JOB_CATEGORY_BEGINNER = 7;
}

message EquipStats {
  int32 str = 1;
  int32 dex = 2;
  int32 int = 3;
  int32 luk = 4;
  int32 attack = 5;
  int32 magic_attack = 6;
  int32 max_hp = 7;
  int32 def = 8;
  int32 max_mp = 9;
}

// Static definition of an item type. Loaded from data/ textprotos at startup;
// shared read-only across all EquipInstances of the same item type.
message EquipPrototype {
  string name = 1;
  int32 required_level = 2;
  EquipStats base_stats = 3;
  AttackSpeed attack_speed = 4;
  EquipSlot equip_slot = 5;
  repeated EquipJobCategory equip_job_categories = 6;
  EquipType equip_type = 7;
  int32 upgrade_slots = 8;
}

// Per-instance mutable state for a single drop of equipment. Persisted in the
// save file; references its prototype by name.
message Equip {
  string equip_name = 1;
  int32 remaining_upgrade_slots = 2;
  EquipStats scroll_stats = 3;
  int32 stars = 4;
}
